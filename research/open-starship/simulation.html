<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Starship — 3D Simulation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; }

  #start {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #000;
  }
  #start h1 {
    font-family: Georgia, serif; font-size: clamp(2rem,6vw,3.8rem);
    color: #fff; letter-spacing: 0.05em; margin-bottom: 0.3em; font-weight: 400;
  }
  #start p { color: #666; font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 2.8em; }
  #btn-start {
    background: #f9a825; color: #000; border: none; font-family: system-ui;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 15px 56px; cursor: pointer;
  }
  #btn-start:hover { background: #ffd54f; }

  #hud {
    position: fixed; top: 16px; left: 16px; color: #fff;
    font-size: 12px; line-height: 2.2; z-index: 10;
    background: rgba(0,0,0,0.72); padding: 12px 18px; border: 1px solid #333;
    display: none;
  }
  #hud .t { font-size: 15px; font-weight: 700; color: #f9a825; }

  #bar {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    display: none; flex-direction: column; gap: 6px;
  }
  #bar select, #bar button {
    background: rgba(0,0,0,0.72); border: 1px solid #444; color: #fff;
    padding: 8px 14px; font-family: system-ui; font-size: 12px; cursor: pointer; outline: none;
    width: 165px;
  }
  #bar select:focus, #bar button:focus { border-color: #f9a825; }
  #bar button:hover { background: rgba(30,30,30,0.9); }
  #bar button.on { color: #f9a825; border-color: #f9a825; }

  #legend {
    position: fixed; bottom: 16px; left: 16px; color: #aaa;
    font-size: 11px; z-index: 10; background: rgba(0,0,0,0.72);
    padding: 10px 14px; border: 1px solid #333; line-height: 2.2;
    display: none;
  }
  .d { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }

  #keys {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #444; font-size: 11px; z-index: 10; display: none;
  }

  #loaderr {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #ef5350; font-size: 12px; z-index: 300; display: none;
    background: rgba(0,0,0,0.9); padding: 10px 24px; text-align: center;
  }
</style>
</head>
<body>

<div id="start">
  <h1>Open Starship</h1>
  <p>Two-Stage Reusable Rocket</p>
  <button id="btn-start">Initialize Launch</button>
</div>

<div id="hud">
  <div style="font-size:12px;font-weight:700;color:#f9a825;margin-bottom:1px">Open Starship</div>
  Stage 1: Super Heavy &nbsp;|&nbsp; Stage 2: Starship<br>
  <span class="t">T+<span id="tm">0</span>s</span> &nbsp;&mdash;&nbsp; <span id="ph">Pre-launch</span>
</div>

<div id="bar">
  <select id="cam">
    <option value="tower">Tower View</option>
    <option value="pad">Launch Pad View</option>
    <option value="wide">Wide View</option>
    <option value="free">Free Orbit</option>
    <option value="follow">Follow Rocket</option>
  </select>
  <button id="play">&#9654; Play</button>
</div>

<div id="legend">
  <span class="d" style="background:#f9a825"></span>Super Heavy booster<br>
  <span class="d" style="background:#c62828"></span>Starship upper stage<br>
  <span class="d" style="background:#2e7d32"></span>Lunar orbit<br>
  <span class="d" style="background:#1565c0"></span>Earth parking orbit
</div>

<div id="keys">Space: play/pause &nbsp;&nbsp;|&nbsp;&nbsp; R: reset</div>
<div id="loaderr"></div>

<!-- Classic script tags (non-module) — reliable in iframes -->
<script src="https://cdn.jsdelivr.net/npm/three@0.123.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.123.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ─── Global Error Handler ────────────────────────────────────────────────────
window.addEventListener('error', function(e) {
  var err = document.getElementById('loaderr');
  var msg = e.message || (e.error && e.error.message) || 'Unknown error';
  var src = e.filename ? e.filename.split('/').pop() : '';
  var ln  = e.lineno ? ' (line ' + e.lineno + ')' : '';
  err.textContent = 'Error' + (src ? ' in ' + src : '') + ln + ': ' + msg;
  err.style.display = 'block';
  console.error('JS Error:', e);
});
window.addEventListener('unhandledrejection', function(e) {
  var err = document.getElementById('loaderr');
  err.textContent = 'Promise Error: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
  err.style.display = 'block';
});

// ─── Constants ───────────────────────────────────────────────────────────────
var EARTH_R   = 60;
var BOOSTER_H = 14;
var BOOSTER_R = 1.35;
var SHIP_H    = 10;
var SHIP_R    = 1.1;

var ROCKET_Y  = EARTH_R + 0.5 + BOOSTER_H * 0.5;

var T0=2, T1=12, T2=16, T3=24, T4=30, T5=40, T6=58, T7=88, T8=98, T9=118, T10=162, T11=177;
var PHS = [
  'Pre-launch','Liftoff & Ascent','Stage Separation','Boostback Burn',
  'Re-entry Burn','Booster Landing','Orbit Circularization',
  'Trans-Lunar Injection','Lunar Orbit Insertion','Lunar Surface',
  'Trans-Earth Injection','Re-entry & Landing'
];

function el(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function lp(a, b, t) { return a + (b-a)*t; }

// ─── Renderer ────────────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// ─── Scene ───────────────────────────────────────────────────────────────────
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x030308);
scene.fog = new THREE.FogExp2(0x030308, 0.00028);

// ─── Camera — Wide preset (earth + rocket clearly visible) ───────────────────
var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(80, 130, 80);
camera.lookAt(0, ROCKET_Y, 0);

// ─── Controls ────────────────────────────────────────────────────────────────
var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 4;
controls.maxDistance = 900;
controls.enabled = false;

// ─── Lights ─────────────────────────────────────────────────────────────────
var sun = new THREE.DirectionalLight(0xfff8e0, 3.2);
sun.position.set(300, 220, 120);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 600;
sun.shadow.camera.left = -150;
sun.shadow.camera.right = 150;
sun.shadow.camera.top = 150;
sun.shadow.camera.bottom = -150;
sun.shadow.bias = -0.0005;
scene.add(sun);

var d2 = new THREE.DirectionalLight(0x4a6fa8, 0.65);
d2.position.set(-150, 90, -100);
scene.add(d2);
scene.add(new THREE.AmbientLight(0x0d1a2a, 1.0));

var glow1 = new THREE.PointLight(0xff8800, 0, 100);
var glow2 = new THREE.PointLight(0xffdd00, 0, 50);
scene.add(glow1, glow2);

// ─── Stars ──────────────────────────────────────────────────────────────────
(function() {
  var n = 5000, pos = new Float32Array(n*3);
  for (var i = 0; i < n; i++) {
    var th = Math.random()*Math.PI*2;
    var ph = Math.acos(2*Math.random()-1);
    var r  = 900 + Math.random()*50;
    pos[i*3]   = r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1] = r*Math.sin(ph)*Math.sin(th);
    pos[i*3+2] = r*Math.cos(ph);
  }
  var g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color:0xffffff, size:0.9, sizeAttenuation:true })));
})();

// ─── Earth ──────────────────────────────────────────────────────────────────
var earth = new THREE.Group();
(function() {
  var land = new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_R, 72, 72),
    new THREE.MeshStandardMaterial({ color: 0x1e5028, roughness: 0.92 })
  );
  land.receiveShadow = true;
  earth.add(land);

  var patch = new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_R+0.08, 72, 72),
    new THREE.MeshStandardMaterial({ color:0x163820, transparent:true, opacity:0.65, roughness:1.0 })
  );
  earth.add(patch);

  var atmo = new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_R*1.025, 48, 48),
    new THREE.ShaderMaterial({
      vertexShader: 'varying vec3 n; void main(){ n=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }',
      fragmentShader: 'varying vec3 n; void main(){ float d=max(dot(n,vec3(0,0,1)),0.0); gl_FragColor=vec4(0.18,0.48,1.0,pow(1.0-d,3.0)*0.68); }',
      blending: THREE.AdditiveBlending, side: THREE.BackSide, transparent:true, depthWrite:false
    })
  );
  earth.add(atmo);
})();
  scene.add(earth);

// ─── Launch Complex ──────────────────────────────────────────────────────────
(function() {
  var mat = function(c) { return new THREE.MeshStandardMaterial({ color:c, roughness:0.85, metalness:0.1 }); };

  var ground = new THREE.Mesh(
    new THREE.CylinderGeometry(28, 28, 0.5, 32),
    new THREE.MeshStandardMaterial({ color:0x3a3a3a, roughness:0.95 })
  );
  ground.position.y = EARTH_R + 0.25;
  ground.receiveShadow = true;
  scene.add(ground);

  var pad = new THREE.Mesh(new THREE.CylinderGeometry(4.5, 4.5, 0.5, 20), mat(0x5a5a5a));
  pad.position.y = EARTH_R + 0.5 + BOOSTER_H * 0.5 - 0.5; // top surface at ROCKET_Y
  pad.receiveShadow = true;
  scene.add(pad);

  for (var i = 0; i < 12; i++) {
    var a = (i/12)*Math.PI*2;
    var m = new THREE.Mesh(
      new THREE.BoxGeometry(0.2, 0.04, 2.8),
      new THREE.MeshStandardMaterial({ color:0xffc107, roughness:0.7, emissive:0x332200 })
    );
    m.position.set(Math.cos(a)*3.4, EARTH_R+0.76, Math.sin(a)*3.4);
    m.rotation.y = a;
    scene.add(m);
  }

  var tMat = mat(0x7c7c7c);
  var tower = new THREE.Mesh(new THREE.BoxGeometry(0.75, 18, 0.75), tMat);
  tower.position.set(6.5, EARTH_R+9.5, 0);
  tower.castShadow = true;
  scene.add(tower);

  var boom = new THREE.Mesh(new THREE.BoxGeometry(4.2, 0.35, 0.35), tMat);
  boom.position.set(3.8, EARTH_R+16.2, 0);
  boom.rotation.z = -0.3;
  scene.add(boom);

  for (var j = 0; j < 3; j++) {
    var brace = new THREE.Mesh(new THREE.BoxGeometry(0.15, 5.5, 0.15), mat(0x646464));
    var ba = j*Math.PI*0.5 + Math.PI*0.25;
    brace.position.set(6.5+Math.cos(ba)*2.1, EARTH_R+5+j*2.8, Math.sin(ba)*2.1);
    brace.rotation.z = (j%2===0?1:-1)*0.55;
    scene.add(brace);
  }

  var ft = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.4, 5.5), new THREE.MeshStandardMaterial({ color:0x1a1a1a, roughness:1.0 }));
  ft.position.set(0, EARTH_R+0.2, 5.5);
  scene.add(ft);
})();

// ─── Moon ───────────────────────────────────────────────────────────────────
var MOON_DIST = 480;

(function addMoonOrbit() {
  var pts = [];
  for (var i = 0; i <= 80; i++) {
    var a = (i/80)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*MOON_DIST, 0, Math.sin(a)*MOON_DIST));
  }
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color:0x2e7d32, transparent:true, opacity:0.3 })
  ));
})();

(function addEarthOrbit() {
  var pts = [];
  for (var i = 0; i <= 80; i++) {
    var a = (i/80)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*(EARTH_R+3.5), 0, Math.sin(a)*(EARTH_R+3.5)));
  }
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color:0x1565c0, transparent:true, opacity:0.35 })
  ));
})();

var moon = new THREE.Mesh(
  new THREE.SphereGeometry(16, 40, 40),
  new THREE.MeshStandardMaterial({ color:0xcccccc, roughness:0.95, metalness:0.05 })
);
scene.add(moon);

// ─── Rocket ─────────────────────────────────────────────────────────────────
var mMat = function(c, em, ei) { return new THREE.MeshStandardMaterial({ color:c, roughness:0.35, metalness:0.85, emissive:em||0x000000, emissiveIntensity:ei||0.05 }); };

var booster = new THREE.Group();
(function b() {
  var bm = new THREE.Mesh(new THREE.CylinderGeometry(BOOSTER_R, BOOSTER_R, BOOSTER_H, 32), mMat(0xd0d0d0));
  bm.castShadow = true;
  booster.add(bm);

  var hdr = new THREE.Mesh(new THREE.CylinderGeometry(BOOSTER_R*.93,BOOSTER_R*.93,BOOSTER_H*.1,32), mMat(0x444444,0x110000,.2));
  hdr.position.y = BOOSTER_H*.45; booster.add(hdr);

  var its = new THREE.Mesh(new THREE.CylinderGeometry(BOOSTER_R*1.07,BOOSTER_R*1.05,.65,32), mMat(0xaaaaaa));
  its.position.y = BOOSTER_H*.42; booster.add(its);

  for (var i = 0; i < 4; i++) {
    var fin = new THREE.Mesh(new THREE.BoxGeometry(.13,1.7,1.0), mMat(0x606060));
    var a = i*Math.PI/2;
    fin.position.set(Math.cos(a)*(BOOSTER_R+.45), BOOSTER_H*.38, Math.sin(a)*(BOOSTER_R+.45));
    fin.rotation.y = a; booster.add(fin);
  }

  for (var i = 0; i < 13; i++) {
    var out = i>=7, idx = out?i-7:i, ang = idx*(Math.PI*2/6)+(out?Math.PI/6:0), ro = out?.62:0;
    var bell = new THREE.Mesh(new THREE.CylinderGeometry(out?.24:.16, out?.36:.22, .5, 14), mMat(0x909090));
    bell.position.set(Math.cos(ang)*ro, -BOOSTER_H*.5+.25, Math.sin(ang)*ro); booster.add(bell);
  }

  for (var i = 0; i < 4; i++) {
    var leg = new THREE.Mesh(new THREE.BoxGeometry(.13,2.6,.45), mMat(0x686868));
    var a = i*Math.PI/2+.4;
    leg.position.set(Math.cos(a)*(BOOSTER_R+.4), -BOOSTER_H*.26, Math.sin(a)*(BOOSTER_R+.4));
    leg.rotation.y = a; leg.rotation.z = .28; booster.add(leg);
  }
})();

var ship = new THREE.Group();
(function s() {
  var sm = new THREE.Mesh(new THREE.CylinderGeometry(SHIP_R,SHIP_R,SHIP_H,32), mMat(0xe2e2e2));
  sm.castShadow = true;
  ship.add(sm);

  var nose = new THREE.Mesh(new THREE.ConeGeometry(SHIP_R,2.5,32), mMat(0xcccccc));
  nose.position.y = SHIP_H*.5+1.25; ship.add(nose);

  var win = new THREE.Mesh(new THREE.CylinderGeometry(SHIP_R*1.002,SHIP_R*1.002,.75,32), mMat(0x1a237e,0x0d1b4a,.7));
  win.position.y = SHIP_H*.15; ship.add(win);

  for (var i = 0; i < 3; i++) {
    var a = i*2.094+Math.PI/2;
    var bell = new THREE.Mesh(new THREE.CylinderGeometry(.2,.33,.6,14), mMat(0x808080));
    bell.position.set(Math.cos(a)*.5, -SHIP_H*.5+.3, Math.sin(a)*.5); ship.add(bell);
  }

  for (var i = 0; i < 2; i++) {
    var fin = new THREE.Mesh(new THREE.BoxGeometry(.12,1.15,.78), mMat(0x555555));
    fin.position.set((i===0?1:-1)*(SHIP_R+.28), SHIP_H*.28, 0); ship.add(fin);
  }

  for (var i = 0; i < 2; i++) {
    var flap = new THREE.Mesh(new THREE.BoxGeometry(.12,1.75,.88), mMat(0xb0b0b0));
    flap.position.set((i===0?1:-1)*(SHIP_R+.2), -SHIP_H*.13, 0); ship.add(flap);
  }
})();

// Booster and ship are direct scene children — their position IS world position
scene.add(booster);
scene.add(ship);
booster.position.set(0, ROCKET_Y, 0);
ship.position.set(0, ROCKET_Y + BOOSTER_H*.5 + .65 + SHIP_H*.5, 0);
// rocketVis: visual placeholder at launch pad
var rocketVis = new THREE.Group();
rocketVis.position.set(0, ROCKET_Y, 0);
scene.add(rocketVis);
// ─── Particles ───────────────────────────────────────────────────────────────
var PC=600, PG=new THREE.BufferGeometry(), PP=new Float32Array(PC*3), PV=new Float32Array(PC*3), PL=new Float32Array(PC);
PG.setAttribute('position', new THREE.BufferAttribute(PP,3));
scene.add(new THREE.Points(PG, new THREE.PointsMaterial({ color:0xff9800, size:1.4, transparent:true, opacity:.9, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true })));

var PC2=250, PG2=new THREE.BufferGeometry(), PP2=new Float32Array(PC2*3), PV2=new Float32Array(PC2*3), PL2=new Float32Array(PC2);
PG2.setAttribute('position', new THREE.BufferAttribute(PP2,3));
scene.add(new THREE.Points(PG2, new THREE.PointsMaterial({ color:0xfff0a0, size:.9, transparent:true, opacity:.95, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true })));

function emit(wp, n, vy, sp, h) {
  var Pp = h?PP2:PP, Pv = h?PV2:PV, Pl = h?PL2:PL, cnt = h?PC2:PC;
  var j = 0;
  for (var i=0; i<cnt && j<n; i++) {
    if (Pl[i]<=0) {
      Pl[i] = .35+Math.random()*.75;
      Pp[i*3]   = wp.x+(Math.random()-.5)*sp;
      Pp[i*3+1] = wp.y;
      Pp[i*3+2] = wp.z+(Math.random()-.5)*sp;
      Pv[i*3]   = (Math.random()-.5)*vy*.3;
      Pv[i*3+1] = -(Math.random()*vy*(h?.6:1));
      Pv[i*3+2] = (Math.random()-.5)*vy*.3;
      j++;
    }
  }
}

function updP(dt) {
  var a1=false, a2=false;
  for (var i=0;i<PC;i++) {
    if (PL[i]>0) {
      PL[i]-=dt; PP[i*3]+=PV[i*3]*dt; PP[i*3+1]+=PV[i*3+1]*dt; PP[i*3+2]+=PV[i*3+2]*dt;
      if (PL[i]<=0) PP[i*3+1]=-1e5; else a1=true;
    }
  }
  for (var i=0;i<PC2;i++) {
    if (PL2[i]>0) {
      PL2[i]-=dt; PP2[i*3]+=PV2[i*3]*dt; PP2[i*3+1]+=PV2[i*3+1]*dt; PP2[i*3+2]+=PV2[i*3+2]*dt;
      if (PL2[i]<=0) PP2[i*3+1]=-1e5; else a2=true;
    }
  }
  PG.attributes.position.needsUpdate=true; PG2.attributes.position.needsUpdate=true;
  glow1.intensity=(a1||a2)?3.2:0; glow2.intensity=a2?1.6:0;
}

// ─── UI ──────────────────────────────────────────────────────────────────────
var run=false, t=0, sep=false, pidx=0, earthRot=0;
var cam='wide';

var PRESETS = {
  tower:  { p: new THREE.Vector3(28,82,28),   t: new THREE.Vector3(0,ROCKET_Y+6,0) },
  pad:    { p: new THREE.Vector3(8,EARTH_R+4,14), t: new THREE.Vector3(0,EARTH_R+20,0) },
  wide:   { p: new THREE.Vector3(80,130,80),   t: new THREE.Vector3(0,ROCKET_Y,0) },
  free:   null,
  follow: null
};

document.getElementById('btn-start').addEventListener('click', function() {
  document.getElementById('start').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('bar').style.display = 'flex';
  document.getElementById('legend').style.display = 'block';
  document.getElementById('keys').style.display = '';
  run = true;
  var pb = document.getElementById('play');
  pb.textContent = '⏸ Pause'; pb.classList.add('on');
});

document.getElementById('play').addEventListener('click', function() {
  run = !run;
  var pb = document.getElementById('play');
  pb.textContent = run ? '⏸ Pause' : '▶ Play';
  pb.classList.toggle('on', run);
});

document.getElementById('cam').addEventListener('change', function(e) {
  cam = e.target.value;
  controls.enabled = cam === 'free';
  var pr = PRESETS[cam];
  if (pr) { camera.position.copy(pr.p); controls.target.copy(pr.t); camera.lookAt(pr.t); }
  if (cam === 'follow') { camera.position.set(40,ROCKET_Y+30,80); controls.target.set(0,ROCKET_Y+15,0); }
});

window.addEventListener('keydown', function(e) {
  if (document.getElementById('start').style.display !== 'none') return;
  if (e.code === 'Space') {
    run = !run;
    var pb = document.getElementById('play');
    pb.textContent = run ? '⏸ Pause' : '▶ Play';
    pb.classList.toggle('on', run);
    e.preventDefault();
  }
  if (e.code === 'KeyR') {
    t=0; sep=false; run=true; pidx=0;
    var pb = document.getElementById('play');
    pb.textContent = '⏸ Pause'; pb.classList.add('on');
    document.getElementById('tm').textContent = '0';
    document.getElementById('ph').textContent = 'Pre-launch';
  }
});

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation ───────────────────────────────────────────────────────────────
var last = performance.now();

function animate() {
  requestAnimationFrame(animate);
  var now = performance.now();
  var dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  if (run) t += dt;

  earthRot += dt * 0.01;
  earth.rotation.y = earthRot;

  var ms = 0.055;
  moon.position.set(Math.cos(ms*t)*MOON_DIST, Math.sin(ms*t*0.2)*10, Math.sin(ms*t)*MOON_DIST);
  moon.rotation.y += dt * 0.07;

  var pts = [T0,T1,T2,T3,T4,T5,T6,T7,T8,T9,T10,T11];
  pidx = Math.min(pts.filter(function(v){return t>=v;}).length, pts.length-1);

  // ── Booster ──
  var bp = new THREE.Vector3(), bq = new THREE.Quaternion();

  if (t < T0) {
  } else if (t < T1) {
    var p = (t-T0)/(T1-T0);
    var alt = lp(ROCKET_Y, EARTH_R+14+SHIP_H, el(p));
    var l  = p * Math.PI * 0.48;
    bp.set(Math.sin(l)*alt, Math.cos(l)*alt, 0);
    bq.setFromEuler(new THREE.Euler(-l*.72,0,0));
    var wpb = booster.localToWorld(new THREE.Vector3(0,-BOOSTER_H*.5,0));
    emit(wpb, 18, 5.2, 0.9, false);
    emit(wpb, 8, 3.4, 0.45, true);
    glow1.position.copy(wpb); glow2.position.copy(wpb);
  } else if (t < T2) {
    var p = (t-T1)/(T2-T1);
    var alt = EARTH_R+14+SHIP_H + p*5;
    var l  = Math.PI*.48 + p*.28;
    bp.set(Math.sin(l)*alt, Math.cos(l)*alt, 0);
    bq.setFromEuler(new THREE.Euler(-l*.72,0,0));
  } else if (t < T3) {
    var p = (t-T2)/(T3-T2);
    var alt = lp(EARTH_R+19, EARTH_R+14, p);
    var l  = lp(Math.PI*.76, Math.PI*.12, el(p));
    bp.set(Math.sin(l)*alt, Math.cos(l)*alt, 0);
    bq.setFromEuler(new THREE.Euler(-l,0,0));
    emit(bp, 13, 3.6, 0.75, false);
    glow1.position.copy(bp);
  } else if (t < T4) {
    var p = (t-T3)/(T4-T3);
    var alt = lp(EARTH_R+14, ROCKET_Y, el(p));
    var l  = lp(Math.PI*.12, Math.PI*2.0, el(p));
    bp.set(Math.sin(l)*alt, Math.cos(l)*alt, 0);
    bq.setFromEuler(new THREE.Euler(-l*.22,0,0));
    if (p > 0.4) {
      emit(bp, 20, 4.4, 1.1, false);
      emit(bp, 9, 2.9, 0.55, true);
      glow1.position.copy(bp); glow2.position.copy(bp);
    }
  } else {
    bp.set(Math.sin(Math.PI*2)*ROCKET_Y, Math.cos(Math.PI*2)*ROCKET_Y, 0);
  }
  booster.position.copy(bp);
  booster.quaternion.copy(bq);

  // ── Ship ──
  var sp = new THREE.Vector3(), sq = new THREE.Quaternion();
  var SBY = EARTH_R + 0.5 + BOOSTER_H + 0.65 + SHIP_H*.5;
  var SHIP_LOCAL = BOOSTER_H*.5 + .65 + SHIP_H*.5; // 12.65

  if (t < T0) {
  } else if (t < T5) {
    var p = (t-T0)/(T5-T0);
    var alt = lp(ROCKET_Y, EARTH_R + 14 + SHIP_H - SHIP_LOCAL, el(Math.min(p*1.05,1)));
    var l  = p * Math.PI * 2.1;
    sp.set(Math.sin(l)*alt, Math.cos(l)*alt + 12.65, 0);
    sq.setFromEuler(new THREE.Euler(-l*.8,0,0));
    if (t > T1) { emit(sp, 11, 3.1, 0.6, false); emit(sp, 5, 2.1, 0.35, true); }
  } else if (t < T6) {
    var p = (t-T5)/(T6-T5);
    var l  = Math.PI*2.1 + p*Math.PI*.8;
    var alt = lp(ROCKET_Y, EARTH_R + 3.5 - SHIP_LOCAL, p);
    sp.set(Math.sin(l)*alt, Math.cos(l)*alt + SHIP_LOCAL, 0);
    sq.setFromEuler(new THREE.Euler(-l*.8,0,0));
  } else if (t < T7) {
    var p = (t-T6)/(T7-T6);
    var dist = lp(EARTH_R+5, MOON_DIST-16-10, el(p));
    var l   = lp(Math.PI*2.9, Math.PI*2.2, p);
    sp.set(Math.sin(l)*dist, Math.cos(l)*dist*.1, Math.sin(l*.3)*8);
    sq.setFromEuler(new THREE.Euler(-l*.42,0,l*.04));
    emit(sp, 8, 3.6, 0.7, false);
  } else if (t < T8) {
    var p = (t-T7)/(T8-T7);
    var ma = p*Math.PI*4, sr = 16+3;
    sp.set(MOON_DIST+Math.cos(ma)*sr, Math.sin(ma)*sr*.2, Math.sin(ma)*sr);
    sq.setFromEuler(new THREE.Euler(0,ma,0));
  } else if (t < T9) {
    var ma = Math.PI*4, sr = 16+3;
    sp.set(MOON_DIST+Math.cos(ma)*sr, Math.sin(ma)*sr*.2, Math.sin(ma)*sr);
    sq.setFromEuler(new THREE.Euler(0,ma,0));
  } else if (t < T10) {
    var p = (t-T9)/(T10-T9);
    var dist = lp(MOON_DIST+16+3, EARTH_R+3.5, el(p));
    var ph  = lp(Math.PI*5.0, Math.PI*3.5, p);
    sp.set(Math.cos(ph)*dist, Math.sin(ph)*dist*.07, Math.sin(ph*.7)*12);
    sq.setFromEuler(new THREE.Euler(0,ph,0));
    emit(sp, 9, 3.6, 0.7, false);
  } else if (t < T11) {
    var p = (t-T10)/(T11-T10);
    var alt = lp(EARTH_R+3.5, EARTH_R+.5+SHIP_H*.5, el(p));
    var l  = lp(Math.PI*3.5, Math.PI*4.5, p);
    sp.set(Math.cos(l)*alt, Math.sin(l)*alt, 0);
    sq.setFromEuler(new THREE.Euler(-l*.16,0,0));
    if (p > 0.4) { emit(sp, 15, 3.1, 0.85, false); emit(sp, 6, 2.1, 0.45, true); }
  } else {
    sp.set(Math.cos(Math.PI*4.5)*(EARTH_R+.5+SHIP_H*.5), Math.sin(Math.PI*4.5)*(EARTH_R+.5+SHIP_H*.5), 0);
  }

  ship.position.copy(sp);
  ship.quaternion.copy(sq);

  if (t >= T1 && !sep) { sep = true; ship.position.y += 0.5; }

  if (cam === 'follow') {
    var tgt = (t < T1 || t > T4) ? ship : booster;
    var tp = tgt.position;
    camera.position.lerp(new THREE.Vector3(tp.x+16, tp.y+8, tp.z+16), 0.022);
    controls.target.lerp(tp, 0.04);
  }

  controls.update();
  updP(dt);
  renderer.render(scene, camera);

  document.getElementById('tm').textContent = Math.floor(t);
  document.getElementById('ph').textContent = PHS[pidx];
}

animate();

// ─── Start ───────────────────────────────────────────────────────────────
init();
animate();
</script>
</body>
</html>
