<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Starship — 3D Simulation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; }

  /* ── Start Screen ─────────────────────────────────────────── */
  #start-screen {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(10,10,30,0.92) 0%, rgba(0,0,0,0.97) 100%);
  }
  #start-screen h1 {
    font-family: Georgia, serif; font-size: clamp(2rem, 5vw, 3.5rem);
    color: #fff; letter-spacing: 0.06em; margin-bottom: 0.3em; font-weight: 400;
  }
  #start-screen p {
    color: #888; font-size: 0.85rem; margin-bottom: 2.5em; letter-spacing: 0.12em; text-transform: uppercase;
  }
  #btn-start {
    background: #f9a825; color: #000; border: none;
    font-family: system-ui, sans-serif; font-size: 1rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 14px 48px; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  #btn-start:hover { background: #ffd54f; transform: scale(1.04); }
  #btn-start:active { transform: scale(0.97); }

  /* ── HUD ─────────────────────────────────────────────────── */
  #hud {
    position: absolute; top: 16px; left: 16px; color: #fff;
    font-size: 12px; line-height: 2; z-index: 10;
    background: rgba(0,0,0,0.72); padding: 12px 16px; border: 1px solid #333;
    min-width: 190px;
  }
  #hud .title { font-size: 13px; font-weight: 700; color: #f9a825; margin-bottom: 4px; }
  #hud .time-row { font-size: 14px; font-weight: 600; margin-top: 6px; border-top: 1px solid #333; padding-top: 6px; }
  #hud .time-row span { color: #f9a825; }

  /* ── Controls bar ─────────────────────────────────────────── */
  #controls {
    position: absolute; top: 16px; right: 16px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
  }
  #cam-select, #play-btn {
    background: rgba(0,0,0,0.72); border: 1px solid #444; color: #fff;
    padding: 8px 14px; font-size: 12px; font-family: system-ui, sans-serif;
    cursor: pointer; outline: none;
  }
  #cam-select:focus, #play-btn:focus { border-color: #f9a825; }
  #play-btn { font-size: 13px; letter-spacing: 0.05em; }
  #play-btn:hover { background: rgba(30,30,30,0.9); }
  #play-btn.running { color: #f9a825; border-color: #f9a825; }

  /* ── Legend ───────────────────────────────────────────────── */
  #legend {
    position: absolute; bottom: 16px; left: 16px; color: #aaa;
    font-size: 11px; z-index: 10; background: rgba(0,0,0,0.72);
    padding: 10px 14px; border: 1px solid #333; line-height: 2;
  }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }

  /* ── Key hints ────────────────────────────────────────────── */
  #key-hint {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #555; font-size: 11px; z-index: 10; text-align: center;
  }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <h1>Open Starship</h1>
  <p>Two-Stage Reusable Rocket Simulation</p>
  <button id="btn-start">Initialize Launch</button>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div class="title">Open Starship</div>
  Stage 1: Super Heavy<br>
  Stage 2: Starship<br>
  <div class="time-row">T+<span id="timer">0</span>s &nbsp;|&nbsp; <span id="phase">Pre-launch</span></div>
</div>

<!-- Controls -->
<div id="controls" style="display:none">
  <select id="cam-select">
    <option value="tower">Tower View</option>
    <option value="pad">Launch Pad</option>
    <option value="free">Free Orbit</option>
    <option value="follow">Follow Rocket</option>
  </select>
  <button id="play-btn">&#9654; Play</button>
</div>

<!-- Legend -->
<div id="legend" style="display:none">
  <span class="dot" style="background:#f9a825"></span>Super Heavy booster<br>
  <span class="dot" style="background:#c62828"></span>Starship upper stage<br>
  <span class="dot" style="background:#2e7d32"></span>Lunar orbit<br>
  <span class="dot" style="background:#1565c0"></span>Earth orbit
</div>

<div id="key-hint" style="display:none">Space: play/pause &nbsp;|&nbsp; R: reset</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Renderer ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ─── Scene ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.0005);

// ─── Camera ───────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 1500);
camera.position.set(18, 64, 22);
camera.lookAt(0, 74, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 4;
controls.maxDistance = 600;
controls.enabled = false;

// ─── Lights ───────────────────────────────────────────────────────────────────
// Sun — angled like late afternoon at KSC
const sun = new THREE.DirectionalLight(0xfff5d6, 2.8);
sun.position.set(200, 180, 80);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 600;
sun.shadow.camera.left = -100;
sun.shadow.camera.right = 100;
sun.shadow.camera.top = 100;
sun.shadow.camera.bottom = -100;
sun.shadow.bias = -0.001;
scene.add(sun);

// Fill light from opposite side (blue sky bounce)
const fill = new THREE.DirectionalLight(0x4a6fa5, 0.5);
fill.position.set(-100, 60, -60);
scene.add(fill);

// Ambient — deep blue sky
scene.add(new THREE.AmbientLight(0x1a2a4a, 0.7));

// Engine exhaust glow (dynamic, moves with rocket)
const exhaustLight = new THREE.PointLight(0xff7700, 0, 60);
scene.add(exhaustLight);
const exhaustLight2 = new THREE.PointLight(0xff4400, 0, 30);
scene.add(exhaustLight2);

// ─── Stars ────────────────────────────────────────────────────────────────────
(function() {
  const count = 4500;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 600 + Math.random() * 40;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.9, sizeAttenuation: true })));
})();

// ─── Earth ────────────────────────────────────────────────────────────────────
const EARTH_R = 60;

function createEarth() {
  const g = new THREE.Group();

  // Surface
  const surf = new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_R, 72, 72),
    new THREE.MeshStandardMaterial({ color: 0x1a5c2e, roughness: 0.92, metalness: 0.0 })
  );
  surf.receiveShadow = true;
  g.add(surf);

  // Continent patches
  const patch = new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_R + 0.06, 72, 72),
    new THREE.MeshStandardMaterial({ color: 0x145224, roughness: 1.0, transparent: true, opacity: 0.65 })
  );
  g.add(patch);

  // Atmosphere glow
  const atmo = new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_R * 1.022, 56, 56),
    new THREE.ShaderMaterial({
      vertexShader: `
        varying vec3 vN;
        void main() {
          vN = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vN;
        void main() {
          float d = max(dot(vN, vec3(0.0, 0.0, 1.0)), 0.0);
          float a = pow(1.0 - d, 3.2) * 0.65;
          gl_FragColor = vec4(0.22, 0.52, 1.0, a);
        }
      `,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSphere,
      transparent: true,
      depthWrite: false
    })
  );
  g.add(atmo);

  return g;
}
const earth = createEarth();
scene.add(earth);

// ─── Launch Complex ───────────────────────────────────────────────────────────
function createLaunchComplex() {
  const g = new THREE.Group();

  // Concrete pad
  const pad = new THREE.Mesh(
    new THREE.CylinderGeometry(4, 4, 0.5, 20),
    new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.95, metalness: 0.05 })
  );
  pad.position.y = EARTH_R + 0.25;
  pad.receiveShadow = true;
  g.add(pad);

  // Pad surface markings
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const mark = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 0.04, 2.2),
      new THREE.MeshStandardMaterial({ color: 0xffc107, roughness: 0.8, emissive: 0x332200 })
    );
    mark.position.set(Math.cos(a) * 2.8, EARTH_R + 0.52, Math.sin(a) * 2.8);
    mark.rotation.y = a;
    g.add(mark);
  }

  // Support tower
  const towerMat = new THREE.MeshStandardMaterial({ color: 0x7a7a7a, roughness: 0.75, metalness: 0.25 });
  const tower = new THREE.Mesh(new THREE.BoxGeometry(0.7, 16, 0.7), towerMat);
  tower.position.set(5.5, EARTH_R + 8.5, 0);
  tower.castShadow = true;
  g.add(tower);

  // Tower boom arm (angled toward rocket)
  const boom = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.3, 0.3), towerMat);
  boom.position.set(3.8, EARTH_R + 14, 0);
  boom.rotation.z = -0.35;
  boom.castShadow = true;
  g.add(boom);

  // Tower cross braces
  for (let i = 0; i < 3; i++) {
    const brace = new THREE.Mesh(new THREE.BoxGeometry(0.14, 5, 0.14), towerMat);
    const ang = i * Math.PI * 0.5 + Math.PI * 0.25;
    brace.position.set(5.5 + Math.cos(ang) * 1.8, EARTH_R + 5 + i * 2.5, Math.sin(ang) * 1.8);
    brace.rotation.z = (i % 2 === 0 ? 1 : -1) * 0.5;
    g.add(brace);
  }

  // Flame trench (south of pad)
  const trench = new THREE.Mesh(
    new THREE.BoxGeometry(2.5, 0.4, 5),
    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1.0 })
  );
  trench.position.set(0, EARTH_R + 0.2, 4.5);
  g.add(trench);

  // Lightning rod on tower
  const rod = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, 3, 8),
    new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.5, metalness: 0.9 })
  );
  rod.position.set(5.5, EARTH_R + 17.5, 0);
  g.add(rod);

  return g;
}
const launchComplex = createLaunchComplex();
scene.add(launchComplex);

// ─── Moon ─────────────────────────────────────────────────────────────────────
const MOON_R = 16;
const MOON_DIST = 500;

(function addMoonOrbitPath() {
  const pts = [];
  for (let i = 0; i <= 80; i++) {
    const a = (i / 80) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * MOON_DIST, 0, Math.sin(a) * MOON_DIST));
  }
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x2e7d32, transparent: true, opacity: 0.3 })
  ));
})();

(function addEarthOrbitPath() {
  const pts = [];
  for (let i = 0; i <= 80; i++) {
    const a = (i / 80) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * (EARTH_R + 3), 0, Math.sin(a) * (EARTH_R + 3)));
  }
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x1565c0, transparent: true, opacity: 0.35 })
  ));
})();

function createMoon() {
  const g = new THREE.Group();
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(MOON_R, 40, 40),
    new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.95, metalness: 0.05 })
  );
  mesh.castShadow = true;
  g.add(mesh);
  return g;
}
const moon = createMoon();
scene.add(moon);

// ─── Rocket ───────────────────────────────────────────────────────────────────
function metal(color, emissive = 0x000000, ei = 0.08) {
  return new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.85, emissive, emissiveIntensity: ei });
}

const BOOSTER_H = 14;
const BOOSTER_R = 1.35;
const SHIP_H = 10;
const SHIP_R = 1.1;

// Super Heavy
function createBooster() {
  const g = new THREE.Group();

  // Main body
  const body = new THREE.Mesh(new THREE.CylinderGeometry(BOOSTER_R, BOOSTER_R, BOOSTER_H, 32), metal(0xd0d0d0));
  body.castShadow = true;
  body.receiveShadow = false;
  g.add(body);

  // Header tank (dark nose)
  const hdr = new THREE.Mesh(
    new THREE.CylinderGeometry(BOOSTER_R * 0.93, BOOSTER_R * 0.93, BOOSTER_H * 0.1, 32),
    metal(0x4a4a4a, 0x110000, 0.15)
  );
  hdr.position.y = BOOSTER_H * 0.45;
  g.add(hdr);

  // Interstage ring
  const its = new THREE.Mesh(
    new THREE.CylinderGeometry(BOOSTER_R * 1.07, BOOSTER_R * 1.05, 0.65, 32),
    metal(0xaaaaaa)
  );
  its.position.y = BOOSTER_H * 0.42;
  g.add(its);

  // Grid fins (4x)
  for (let i = 0; i < 4; i++) {
    const fin = new THREE.Mesh(new THREE.BoxGeometry(0.13, 1.7, 0.95), metal(0x606060));
    const a = i * Math.PI / 2;
    fin.position.set(Math.cos(a) * (BOOSTER_R + 0.45), BOOSTER_H * 0.38, Math.sin(a) * (BOOSTER_R + 0.45));
    fin.rotation.y = a;
    g.add(fin);
  }

  // Engine bells (13 — outer ring 6 + inner ring 7)
  for (let i = 0; i < 13; i++) {
    const outer = i >= 7;
    const idx = outer ? i - 7 : i;
    const ang = idx * (Math.PI * 2 / (outer ? 6 : 6));
    const rOff = outer ? 0.6 : 0;
    const bell = new THREE.Mesh(
      new THREE.CylinderGeometry(outer ? 0.23 : 0.16, outer ? 0.34 : 0.22, 0.5, 14),
      metal(0x909090)
    );
    bell.position.set(Math.cos(ang) * rOff, -BOOSTER_H * 0.5 + 0.25, Math.sin(ang) * rOff);
    g.add(bell);
  }

  // Landing legs (4x)
  for (let i = 0; i < 4; i++) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.13, 2.5, 0.45), metal(0x707070));
    const a = i * Math.PI / 2 + 0.4;
    leg.position.set(Math.cos(a) * (BOOSTER_R + 0.4), -BOOSTER_H * 0.27, Math.sin(a) * (BOOSTER_R + 0.4));
    leg.rotation.y = a;
    leg.rotation.z = 0.28;
    g.add(leg);
  }

  return g;
}

// Starship upper stage
function createShip() {
  const g = new THREE.Group();

  // Fuselage
  const body = new THREE.Mesh(new THREE.CylinderGeometry(SHIP_R, SHIP_R, SHIP_H, 32), metal(0xe2e2e2));
  body.castShadow = true;
  g.add(body);

  // Nose cone
  const nose = new THREE.Mesh(new THREE.ConeGeometry(SHIP_R, 2.5, 32), metal(0xcccccc));
  nose.position.y = SHIP_H * 0.5 + 1.25;
  g.add(nose);

  // Window band (dark emissive stripe)
  const win = new THREE.Mesh(
    new THREE.CylinderGeometry(SHIP_R * 1.002, SHIP_R * 1.002, 0.75, 32),
    metal(0x1a237e, 0x0d1b4a, 0.6)
  );
  win.position.y = SHIP_H * 0.15;
  g.add(win);

  // Raptor engines (3)
  for (let i = 0; i < 3; i++) {
    const a = i * 2.094 + Math.PI / 2;
    const bell = new THREE.Mesh(
      new THREE.CylinderGeometry(0.2, 0.33, 0.6, 14),
      metal(0x808080)
    );
    bell.position.set(Math.cos(a) * 0.5, -SHIP_H * 0.5 + 0.3, Math.sin(a) * 0.5);
    g.add(bell);
  }

  // Grid fins (2)
  for (let i = 0; i < 2; i++) {
    const fin = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.15, 0.78), metal(0x555555));
    fin.position.set((i === 0 ? 1 : -1) * (SHIP_R + 0.28), SHIP_H * 0.28, 0);
    g.add(fin);
  }

  // Flaps (2)
  for (let i = 0; i < 2; i++) {
    const flap = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.75, 0.88), metal(0xb0b0b0));
    flap.position.set((i === 0 ? 1 : -1) * (SHIP_R + 0.2), -SHIP_H * 0.13, 0);
    g.add(flap);
  }

  return g;
}

const booster = createBooster();
const ship = createShip();

// Rocket group sits on launch pad
const rocket = new THREE.Group();
ship.position.y = BOOSTER_H * 0.5 + 0.65 + SHIP_H * 0.5;
rocket.add(booster);
rocket.add(ship);
rocket.position.set(0, EARTH_R + 0.5 + BOOSTER_H * 0.5, 0);
scene.add(rocket);

// ─── Exhaust Particles ─────────────────────────────────────────────────────────
const PCOUNT = 500;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PCOUNT * 3);
const pVel = new Float32Array(PCOUNT * 3);
const pLife = new Float32Array(PCOUNT);
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));

const pMat = new THREE.PointsMaterial({
  color: 0xff9500, size: 1.2, transparent: true, opacity: 0.92,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
});
scene.add(new THREE.Points(pGeo, pMat));

// Secondary hot core particles
const PCOUNT2 = 200;
const pGeo2 = new THREE.BufferGeometry();
const pPos2 = new Float32Array(PCOUNT2 * 3);
const pVel2 = new Float32Array(PCOUNT2 * 3);
const pLife2 = new Float32Array(PCOUNT2);
pGeo2.setAttribute('position', new THREE.BufferAttribute(pPos2, 3));
const pMat2 = new THREE.PointsMaterial({
  color: 0xfff0a0, size: 0.8, transparent: true, opacity: 0.95,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
});
scene.add(new THREE.Points(pGeo2, pMat2));

function emitExhaust(worldPos, count, vy, spread, secondary) {
  const cnt = secondary ? PCOUNT2 : PCOUNT;
  const pPos = secondary ? pPos2 : pPos;
  const pVel = secondary ? pVel2 : pVel;
  const pLife = secondary ? pLife2 : pLife;
  let j = 0;
  for (let i = 0; i < cnt && j < count; i++) {
    if (pLife[i] <= 0) {
      pLife[i] = 0.4 + Math.random() * 0.8;
      pPos[i*3]   = worldPos.x + (Math.random()-0.5)*spread;
      pPos[i*3+1] = worldPos.y;
      pPos[i*3+2] = worldPos.z + (Math.random()-0.5)*spread;
      pVel[i*3]   = (Math.random()-0.5)*vy*0.35;
      pVel[i*3+1] = -(Math.random()*vy*(secondary ? 0.7 : 1.0));
      pVel[i*3+2] = (Math.random()-0.5)*vy*0.35;
      j++;
    }
  }
}

function updateParticles(dt) {
  let anyAlive = false;
  let anyAlive2 = false;

  for (let i = 0; i < PCOUNT; i++) {
    if (pLife[i] > 0) {
      pLife[i] -= dt;
      pPos[i*3]   += pVel[i*3]   * dt;
      pPos[i*3+1] += pVel[i*3+1] * dt;
      pPos[i*3+2] += pVel[i*3+2] * dt;
      if (pLife[i] <= 0) pPos[i*3+1] = -1e5;
      else anyAlive = true;
    }
  }
  for (let i = 0; i < PCOUNT2; i++) {
    if (pLife2[i] > 0) {
      pLife2[i] -= dt;
      pPos2[i*3]   += pVel2[i*3]   * dt;
      pPos2[i*3+1] += pVel2[i*3+1] * dt;
      pPos2[i*3+2] += pVel2[i*3+2] * dt;
      if (pLife2[i] <= 0) pPos2[i*3+1] = -1e5;
      else anyAlive2 = true;
    }
  }

  pGeo.attributes.position.needsUpdate = true;
  pGeo2.attributes.position.needsUpdate = true;

  const glow = (anyAlive || anyAlive2) ? 2.5 : 0;
  exhaustLight.intensity = glow;
  exhaustLight2.intensity = anyAlive2 ? glow * 0.6 : 0;
}

// ─── Timeline ─────────────────────────────────────────────────────────────────
const T_LIFTOFF    = 2;
const T_MECO       = 12;
const T_BOOSTBACK  = 16;
const T_ENTRYBURN  = 24;
const T_LANDING    = 30;
const T_S2_CIRC    = 40;
const T_TLI        = 58;
const T_MOON_ORBIT = 88;
const T_LUNAR_SURFACE = 98;
const T_RETURN     = 118;
const T_HOME       = 162;
const T_SPLASH     = 177;

const PHASES = [
  'Pre-launch',
  'Liftoff & Ascent',
  'Stage Separation',
  'Boostback Burn',
  'Re-entry Burn',
  'Booster Landing',
  'Orbit Circularization',
  'Trans-Lunar Injection',
  'Lunar Orbit Insertion',
  'Lunar Surface',
  'Trans-Earth Injection',
  'Re-entry & Landing'
];

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function lerp(a, b, t) { return a + (b - a) * t; }

let phaseIdx = 0;
let running = false;
let simTime = 0;
let separated = false;
let earthRot = 0;

// ─── Rocket physics helpers ────────────────────────────────────────────────────
function rocketBaseWorld() {
  // World position of booster bottom (engine bells)
  const local = new THREE.Vector3(0, -BOOSTER_H * 0.5, 0);
  return booster.localToWorld(local.clone());
}

function shipBaseWorld() {
  const local = new THREE.Vector3(0, -SHIP_H * 0.5, 0);
  return ship.localToWorld(local.clone());
}

// ─── Camera presets ───────────────────────────────────────────────────────────
const PRESETS = {
  tower: { pos: new THREE.Vector3(18, 64, 22), target: new THREE.Vector3(0, 74, 0) },
  pad:   { pos: new THREE.Vector3(6, EARTH_R + 3, 10), target: new THREE.Vector3(0, EARTH_R + 16, 0) },
  free:  null, // handled by OrbitControls
  follow: null // handled in loop
};

let camMode = 'tower';

document.getElementById('cam-select').addEventListener('change', e => {
  camMode = e.target.value;
  controls.enabled = camMode === 'free';
  const p = PRESETS[camMode];
  if (p) {
    camera.position.copy(p.pos);
    controls.target.copy(p.target);
    camera.lookAt(p.target);
  }
  if (camMode === 'follow') {
    camera.position.set(20, EARTH_R + 35, 60);
    controls.target.set(0, EARTH_R + 20, 0);
  }
});

document.getElementById('play-btn').addEventListener('click', () => {
  running = !running;
  document.getElementById('play-btn').textContent = running ? '⏸ Pause' : '▶ Play';
  document.getElementById('play-btn').classList.toggle('running', running);
});

document.getElementById('btn-start').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('legend').style.display = 'block';
  document.getElementById('key-hint').style.display = 'block';
  running = true;
  document.getElementById('play-btn').textContent = '⏸ Pause';
  document.getElementById('play-btn').classList.add('running');
});

// ─── Main Loop ────────────────────────────────────────────────────────────────
let last = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  if (running) simTime += dt;
  const t = simTime;

  // Phase
  const pts = [T_LIFTOFF,T_MECO,T_BOOSTBACK,T_ENTRYBURN,T_LANDING,T_S2_CIRC,T_TLI,T_MOON_ORBIT,T_LUNAR_SURFACE,T_RETURN,T_HOME,T_SPLASH];
  phaseIdx = Math.min(pts.filter(v => t >= v).length, pts.length - 1);

  // Earth rotation
  earthRot += dt * 0.012;
  earth.rotation.y = earthRot;

  // Moon orbit
  const mos = 0.055;
  moon.position.set(
    Math.cos(mos * t) * MOON_DIST,
    Math.sin(mos * t * 0.2) * 10,
    Math.sin(mos * t) * MOON_DIST
  );
  moon.rotation.y += dt * 0.07;

  // ── Booster ──
  let bP = new THREE.Vector3(), bQ = new THREE.Quaternion();

  if (t < T_LIFTOFF) {
    bP.set(0, EARTH_R + 0.5 + BOOSTER_H * 0.5, 0);
  } else if (t < T_MECO) {
    const pct = (t - T_LIFTOFF) / (T_MECO - T_LIFTOFF);
    const alt = lerp(EARTH_R + 0.5 + BOOSTER_H * 0.5, EARTH_R + 14 + SHIP_H, easeInOut(pct));
    const lon = pct * Math.PI * 0.48;
    bP.set(Math.sin(lon) * alt, Math.cos(lon) * alt, 0);
    bQ.setFromEuler(new THREE.Euler(-lon * 0.72, 0, 0));
    emitExhaust(rocketBaseWorld(), 14, 4.5, 0.7, false);
    emitExhaust(rocketBaseWorld(), 6, 3.0, 0.4, true);
    exhaustLight.position.copy(rocketBaseWorld());
    exhaustLight2.position.copy(rocketBaseWorld());
  } else if (t < T_BOOSTBACK) {
    const pct = (t - T_MECO) / (T_BOOSTBACK - T_MECO);
    const alt = EARTH_R + 14 + SHIP_H + pct * 5;
    const lon = Math.PI * 0.48 + pct * 0.28;
    bP.set(Math.sin(lon) * alt, Math.cos(lon) * alt, 0);
    bQ.setFromEuler(new THREE.Euler(-lon * 0.72, 0, 0));
  } else if (t < T_ENTRYBURN) {
    const pct = (t - T_BOOSTBACK) / (T_ENTRYBURN - T_BOOSTBACK);
    const alt = lerp(EARTH_R + 19, EARTH_R + 14, pct);
    const lon = lerp(Math.PI * 0.76, Math.PI * 0.12, easeInOut(pct));
    bP.set(Math.sin(lon) * alt, Math.cos(lon) * alt, 0);
    bQ.setFromEuler(new THREE.Euler(-lon, 0, 0));
    emitExhaust(bP, 10, 3.2, 0.6, false);
    exhaustLight.position.copy(bP);
  } else if (t < T_LANDING) {
    const pct = (t - T_ENTRYBURN) / (T_LANDING - T_ENTRYBURN);
    const alt = lerp(EARTH_R + 14, EARTH_R + 0.5 + BOOSTER_H * 0.5, easeInOut(pct));
    const lon = lerp(Math.PI * 0.12, Math.PI * 2.0, easeInOut(pct));
    bP.set(Math.sin(lon) * alt, Math.cos(lon) * alt, 0);
    bQ.setFromEuler(new THREE.Euler(-lon * 0.22, 0, 0));
    if (pct > 0.42) {
      emitExhaust(bP, 16, 3.8, 0.9, false);
      emitExhaust(bP, 7, 2.5, 0.5, true);
      exhaustLight.position.copy(bP);
      exhaustLight2.position.copy(bP);
    }
  } else {
    bP.set(
      Math.sin(Math.PI * 2.0) * (EARTH_R + 0.5 + BOOSTER_H * 0.5),
      Math.cos(Math.PI * 2.0) * (EARTH_R + 0.5 + BOOSTER_H * 0.5),
      0
    );
  }

  booster.position.copy(bP);
  booster.quaternion.copy(bQ);

  // ── Ship ──
  let sP = new THREE.Vector3(), sQ = new THREE.Quaternion();

  if (t < T_LIFTOFF) {
    sP.set(0, EARTH_R + 0.5 + BOOSTER_H + 0.65 + SHIP_H * 0.5, 0);
  } else if (t < T_S2_CIRC) {
    const pct = (t - T_LIFTOFF) / (T_S2_CIRC - T_LIFTOFF);
    const alt = lerp(EARTH_R + 0.5 + BOOSTER_H + 0.65 + SHIP_H * 0.5, EARTH_R + 3, easeInOut(Math.min(pct * 1.05, 1)));
    const lon = pct * Math.PI * 2.1;
    sP.set(Math.sin(lon) * alt, Math.cos(lon) * alt, 0);
    sQ.setFromEuler(new THREE.Euler(-lon * 0.8, 0, 0));
    if (t > T_MECO) {
      emitExhaust(sP, 8, 2.8, 0.5, false);
      emitExhaust(sP, 4, 1.8, 0.3, true);
    }
  } else if (t < T_TLI) {
    const pct = (t - T_S2_CIRC) / (T_TLI - T_S2_CIRC);
    const lon = Math.PI * 2.1 + pct * Math.PI * 0.8;
    const alt = EARTH_R + 3 + pct * 2;
    sP.set(Math.sin(lon) * alt, Math.cos(lon) * alt, 0);
    sQ.setFromEuler(new THREE.Euler(-lon * 0.8, 0, 0));
  } else if (t < T_MOON_ORBIT) {
    const pct = (t - T_TLI) / (T_MOON_ORBIT - T_TLI);
    const dist = lerp(EARTH_R + 5, MOON_DIST - MOON_R - 10, easeInOut(pct));
    const lon = lerp(Math.PI * 2.9, Math.PI * 2.2, pct);
    sP.set(Math.sin(lon) * dist, Math.cos(lon) * dist * 0.1, Math.sin(lon * 0.3) * 8);
    sQ.setFromEuler(new THREE.Euler(-lon * 0.42, 0, lon * 0.04));
    emitExhaust(sP, 6, 3.2, 0.6, false);
  } else if (t < T_LUNAR_SURFACE) {
    const pct = (t - T_MOON_ORBIT) / (T_LUNAR_SURFACE - T_MOON_ORBIT);
    const ma = pct * Math.PI * 4;
    const sr = MOON_R + 3;
    sP.set(MOON_DIST + Math.cos(ma) * sr, Math.sin(ma) * sr * 0.2, Math.sin(ma) * sr);
    sQ.setFromEuler(new THREE.Euler(0, ma, 0));
  } else if (t < T_RETURN) {
    const pct = (t - T_LUNAR_SURFACE) / (T_RETURN - T_LUNAR_SURFACE);
    const ma = Math.PI * 4;
    const sr = MOON_R + 3 - pct * 3;
    sP.set(MOON_DIST + Math.cos(ma) * sr, Math.sin(ma) * sr * 0.2, Math.sin(ma) * sr);
    sQ.setFromEuler(new THREE.Euler(0, ma, 0));
  } else if (t < T_HOME) {
    const pct = (t - T_RETURN) / (T_HOME - T_RETURN);
    const dist = lerp(MOON_DIST + MOON_R + 3, EARTH_R + 3, easeInOut(pct));
    const ph = lerp(Math.PI * 5.0, Math.PI * 3.5, pct);
    sP.set(Math.cos(ph) * dist, Math.sin(ph) * dist * 0.07, Math.sin(ph * 0.7) * 12);
    sQ.setFromEuler(new THREE.Euler(0, ph, 0));
    emitExhaust(sP, 7, 3.2, 0.6, false);
  } else if (t < T_SPLASH) {
    const pct = (t - T_HOME) / (T_SPLASH - T_HOME);
    const alt = lerp(EARTH_R + 3, EARTH_R + 0.5 + SHIP_H * 0.5, easeInOut(pct));
    const lon = lerp(Math.PI * 3.5, Math.PI * 4.5, pct);
    sP.set(Math.cos(lon) * alt, Math.sin(lon) * alt, 0);
    sQ.setFromEuler(new THREE.Euler(-lon * 0.16, 0, 0));
    if (pct > 0.4) {
      emitExhaust(sP, 12, 2.8, 0.7, false);
      emitExhaust(sP, 5, 1.8, 0.4, true);
    }
  } else {
    sP.set(
      Math.cos(Math.PI * 4.5) * (EARTH_R + 0.5 + SHIP_H * 0.5),
      Math.sin(Math.PI * 4.5) * (EARTH_R + 0.5 + SHIP_H * 0.5),
      0
    );
  }

  ship.position.copy(sP);
  ship.quaternion.copy(sQ);

  if (t >= T_MECO && !separated) { separated = true; ship.position.y += 0.5; }

  // ── Camera ──
  if (camMode === 'follow') {
    const target = (t < T_MECO || t > T_LANDING) ? ship : booster;
    const tp = target.position;
    const offset = new THREE.Vector3(12, 6, 12);
    camera.position.lerp(tp.clone().add(offset), 0.025);
    controls.target.lerp(tp, 0.05);
  }

  controls.update();
  updateParticles(dt);
  renderer.render(scene, camera);

  // HUD
  if (running || simTime > 0) {
    document.getElementById('timer').textContent = Math.floor(simTime);
    document.getElementById('phase').textContent = PHASES[phaseIdx];
  }
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    const startScreen = document.getElementById('start-screen');
    if (startScreen.style.display !== 'none') return;
    running = !running;
    document.getElementById('play-btn').textContent = running ? '⏸ Pause' : '▶ Play';
    document.getElementById('play-btn').classList.toggle('running', running);
    e.preventDefault();
  }
  if (e.code === 'KeyR') {
    simTime = 0; separated = false; running = true;
    document.getElementById('play-btn').textContent = '⏸ Pause';
    document.getElementById('play-btn').classList.add('running');
    document.getElementById('timer').textContent = '0';
    document.getElementById('phase').textContent = 'Pre-launch';
  }
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
